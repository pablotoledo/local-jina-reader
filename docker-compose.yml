services:
  api:
    build: .
    container_name: intranet-reader-api
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file: .env
    volumes:
      - hf-cache:/root/.cache/huggingface   # persisted model weights
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - reader-net
    # GPU — uncomment if you have NVIDIA Container Toolkit
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  redis:
    image: redis:7-alpine
    container_name: intranet-reader-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - reader-net

volumes:
  hf-cache:      # ~3 GB — ReaderLM-v2 weights
  redis-data:

networks:
  reader-net:
    driver: bridge
